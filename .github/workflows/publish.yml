name: Publish to PyPI

# Triggered when a version tag like v0.1.0 is pushed. Uses PyPI Trusted
# Publishing (no tokens stored) — configure the project's publisher on
# pypi.org to match `machinefi/qspro-cli` + workflow `publish.yml`.
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # needed for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
